    <script src="animal-test.js"></script>

    <script>
        const navLotto = document.getElementById('nav-lotto');
        const navAnimal = document.getElementById('nav-animal');
        const sectionLotto = document.getElementById('section-lotto');
        const sectionAnimal = document.getElementById('section-animal');

        navLotto.addEventListener('click', () => {
            navLotto.classList.add('active');
            navAnimal.classList.remove('active');
            sectionLotto.classList.add('active');
            sectionAnimal.classList.remove('active');
        });

        navAnimal.addEventListener('click', () => {
            navAnimal.classList.add('active');
            navLotto.classList.remove('active');
            sectionAnimal.classList.add('active');
            sectionLotto.classList.remove('active');
        });
